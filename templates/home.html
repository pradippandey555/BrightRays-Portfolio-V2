<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pradip Pandey — SOC Analyst Portfolio</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            background-color: #ffffff;
            color: #1F2328;
            line-height: 1.5;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        
        .font-mono {
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
        }

        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #ffffff;
        }
        ::-webkit-scrollbar-thumb {
            background: #d0d7de;
            border-radius: 6px;
            border: 2px solid #ffffff;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #8c959f;
        }

        .panel-card {
            background-color: #ffffff;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            transition: border-color 0.2s ease;
        }
        .panel-card:hover {
            border-color: #0969da;
        }

        .btn-primary {
            background-color: #2da44e;
            color: #ffffff;
            border: 1px solid rgba(27, 31, 36, 0.15);
            border-radius: 6px;
            font-weight: 600;
            transition: background-color 0.2s ease;
            cursor: pointer;
        }
        .btn-primary:hover {
            background-color: #2c974b;
        }
        
        .btn-secondary {
            background-color: #f6f8fa;
            color: #24292f;
            border: 1px solid rgba(27, 31, 36, 0.15);
            border-radius: 6px;
            font-weight: 600;
            transition: background-color 0.2s ease;
        }
        .btn-secondary:hover {
            background-color: #f3f4f6;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const personalInfo = {
            name: "Pradip Pandey", 
            title: "SOC Analyst & Cybersecurity Specialist",
            email: "pradippandey555@gmail.com",
            github: "pradippandey555",
            linkedin: "pradip-pandey-317997195"
        };

        const aboutHighlights = [
            "Network Defense", "SIEM & Threat Detection", "Cisco Networking",
            "Cloud Security (Azure/AWS)", "System Administration", "Incident Response", "Threat Surface Analysis"
        ];

        const skillsData = [
            {
                category: "Operating Systems",
                icon: "fa-desktop",
                items: ["Windows Server 2019/2022: AD, Group Policy", "Windows 10/11 administration", "Linux (Ubuntu, CentOS) config", "macOS basic administration"]
            },
            {
                category: "Networking & Security",
                icon: "fa-network-wired",
                items: ["Cisco routing & switching (VLANs, OSPF)", "Network monitoring (SIEM, NetFlow)", "Threat surface analysis", "VPN setup & Access control"]
            },
            {
                category: "Cloud Security & Infra",
                icon: "fa-cloud",
                items: ["Azure & AWS fundamentals", "Cloud security settings", "Defense-in-depth architecture", "VMware & VirtualBox labs"]
            },
            {
                category: "Programming & Development",
                icon: "fa-code",
                items: ["Python & Bash automation", "JavaScript, HTML5, CSS3", "Flask web app development", "Secure coding (OWASP Top 10)"]
            },
            {
                category: "Security Operations",
                icon: "fa-shield-halved",
                items: ["SIEM tool application", "Risk assessment & ISO 27001", "Incident response planning", "System analysis & SDLC"]
            },
            {
                category: "Soft Skills",
                icon: "fa-people-group",
                items: ["Clear communication", "Collaborative teamwork", "Problem‑solving under pressure", "Adaptability"]
            }
        ];

        const education = [
            {
                degree: "Bachelor of Cybersecurity (Final Year)",
                institution: "Charles Sturt University",
                year: "2023 - Present",
                details: "Advanced focus on Digital Forensics, Network Security, and System Analysis. Dual-qualification pathway."
            },
            {
                degree: "Diploma of Information Technology (Networking)",
                institution: "TAFE NSW",
                year: "2022",
                details: "Specialized in advanced network configuration, server management (Windows/Linux), and cybersecurity management protocols."
            }
        ];

        const projects = [
            {
                title: "Threat Surface Analysis Simulation",
                category: "Cybersecurity",
                description: "Conducted asset discovery and vulnerability assessment for a simulated network. Mapped attack paths and documented remediation plans for known vulns.",
                tech: ["Nmap", "Wireshark", "CVE Databases"]
            },
            {
                title: "Defense-in-Depth Architecture",
                category: "Networking",
                description: "Designed a layered defense for a hybrid environment including network segmentation, access control policies, and advanced Windows Firewall rules.",
                tech: ["Defense-in-Depth", "VLANs", "Policy Dev"]
            },
            {
                title: "SIEM Monitoring & Tracking",
                category: "Security Operations",
                description: "Configured and utilized SIEM tools to track potential risks and anomalies in real-time server and network logs. Automated alerts for specific incident types.",
                tech: ["SIEM", "Log Parsing", "Incident Detection"]
            },
            {
                title: "Windows Server & AD Management",
                category: "Operating Systems",
                description: "Installed and configured Windows Server with AD, Group Policy, DNS, DHCP, and access controls. Integrated Defender AV for endpoint protection.",
                tech: ["Active Directory", "Group Policy", "Windows Server"]
            },
            {
                title: "Python & Bash Automation",
                category: "Development",
                description: "Developed scripts to automate log analysis, parse CSV network reports, and perform automated system checks for security deviations.",
                tech: ["Python", "Bash", "Automation"]
            },
            {
                title: "Virtualization & Infrastructure Labs",
                category: "Virtualization",
                description: "Built virtual lab environments using VirtualBox and VMware to simulate multi‑OS networks for testing and training. Configured virtual switches and NAT.",
                tech: ["VMware", "VirtualBox", "Networking"]
            }
        ];

        const Navbar = () => {
            const navLinks = [
                { name: 'About', href: '#about' },
                { name: 'Skills', href: '#skills' },
                { name: 'Projects', href: '#projects' },
                { name: 'Education', href: '#education' },
                { name: 'Contact', href: '#contact' },
            ];

            return (
                <nav className="fixed w-full z-50 bg-[#f6f8fa] border-b border-[#d0d7de]">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex items-center justify-between h-16">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => window.scrollTo(0,0)}>
                                <i className="fas fa-shield-alt text-[28px] text-[#0969da]"></i>
                                <span className="font-semibold text-[#24292f] text-lg hover:text-[#0969da] transition-colors">{personalInfo.name}</span>
                            </div>
                            <div className="hidden md:block">
                                <div className="ml-10 flex items-baseline space-x-6">
                                    {navLinks.map((link) => (
                                        <a key={link.name} href={link.href} className="text-[#24292f] hover:text-[#0969da] px-3 py-2 text-sm font-semibold transition-colors">
                                            {link.name}
                                        </a>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </nav>
            );
        };

        const Hero = () => {
            const [isTerminalOpen, setIsTerminalOpen] = useState(false);
            const [terminalInput, setTerminalInput] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);
            const [terminalHistory, setTerminalHistory] = useState([
                { type: 'system', text: '# Initializing connection to Threat APIs...' },
                { type: 'system', text: '[+] Threat APIs........CONNECTED' },
                { type: 'system', text: '[+] Shodan..............READING' },
                { type: 'system', text: '[+] Llama Analysis......AVAILABLE' },
                { type: 'success', text: '✓ CYBER AGENT v1.0 ONLINE' },
                { type: 'system', text: 'Ready for input...' }
            ]);
            
            const terminalEndRef = useRef(null);

            useEffect(() => {
                terminalEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [terminalHistory, isProcessing, isTerminalOpen]);

            const handleTerminalSubmit = async (e) => {
                e.preventDefault();
                if (!terminalInput.trim() || isProcessing) return;

                const command = terminalInput.trim();
                setTerminalInput('');
                
                setTerminalHistory(prev => [...prev, { type: 'user', text: `$ ${command}` }]);
                setIsProcessing(true);

                try {
                    const response = await fetch('/api/terminal', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ command })
                    });
                    
                    const data = await response.json();
                    
                    // Clean the AI response by removing markdown asterisks
                    const cleanedResponse = data.response.replace(/\*\*/g, '');
                    
                    setTerminalHistory(prev => [...prev, { type: 'ai', text: `> ${cleanedResponse}` }]);
                } catch (error) {
                    setTerminalHistory(prev => [...prev, { type: 'error', text: '> CRITICAL ERROR: Unable to reach backend server.' }]);
                } finally {
                    setIsProcessing(false);
                }
            };

            return (
                <section className="pt-24 pb-12 bg-[#ffffff] border-b border-[#d0d7de]">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 z-10 grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                        <div className="space-y-6">
                            <div className="inline-flex items-center space-x-2 px-3 py-1 rounded-full border border-[#d0d7de] text-[#656d76] text-xs font-semibold">
                                <span className="w-2 h-2 bg-[#2da44e] rounded-full"></span>
                                <span>Open to Work: SOC Analyst</span>
                            </div>
                            
                            <h1 className="text-4xl md:text-5xl font-bold tracking-tight text-[#1F2328] leading-tight">
                                Empowering Communities Through <span className="text-[#0969da]">Secure Technology</span>
                            </h1>
                            
                            <p className="font-mono text-[#656d76] text-sm bg-[#f6f8fa] p-2 rounded-md border border-[#d0d7de] inline-block">
                                &gt; specialised in Cybersecurity, Cloud Security & Network Infrastructure
                            </p>

                            <div className="text-[#24292f] text-base max-w-2xl leading-relaxed space-y-4">
                                <p>I am a final-year Bachelor of Information Technology (Cybersecurity) student at Charles Sturt University, who previously gained a solid technical base through my Diploma of Information Technology (Networking) at the TAFE NSW. I have been inspired to pursue academics by the understanding that secure networks are the foundation of infrastructure of the modern enterprise, and now am seeking to utilize this two-fold knowledge as a SOC Analyst or Cybersecurity Specialist.</p>
                                <p>By undertaking the dual-qualification option, I have ensured I have a holistic technical toolkit. I am highly skilled in the setup and protection of Cisco networking systems, administration of Cloud Security settings, and the establishment of solid defense-in-depth architecture. I have relevant practical experience in threat surface analysis, vulnerability assessment, and application of SIEM tools to track and prevent risks in hybrid infrastructures.</p>
                                <p>My shortterm career objective is to land a position in a Security Operations Centre where I can help in real time detection of threats and response to the incidents. The topics I find especially intriguing include Network Security and Cloud Architecture intersection, which is why I am determined to engage in a continuous learning process to keep up with the ever-changing threat landscape all over the world.</p>
                            </div>

                            <div className="flex flex-col sm:flex-row gap-3 pt-2">
                                <a href="#contact" className="btn-primary px-6 py-2 flex items-center justify-center gap-2">
                                    <i className="fas fa-envelope"></i> Contact Me
                                </a>
                                <a href="#projects" className="btn-secondary px-6 py-2 flex items-center justify-center gap-2">
                                    <i className="fas fa-folder-open"></i> View Projects
                                </a>
                            </div>
                        </div>

                        <div className="relative hidden lg:block">
                            <div className="border border-[#d0d7de] rounded-md shadow-sm bg-[#f6f8fa] p-10 text-center">
                                <div className="w-20 h-20 mx-auto bg-[#ffffff] border border-[#d0d7de] rounded-full flex items-center justify-center mb-6 shadow-sm">
                                    <i className="fas fa-terminal text-4xl text-[#0969da]"></i>
                                </div>
                                <h3 className="text-2xl font-bold text-[#1F2328] mb-3">Cyber Agent Node</h3>
                                <p className="text-[#656d76] text-base mb-8 px-4">
                                    My custom AI-powered threat analysis and query system is currently online and standing by.
                                </p>
                                <button 
                                    onClick={() => setIsTerminalOpen(true)}
                                    className="btn-primary w-full py-4 text-lg shadow-sm flex items-center justify-center gap-3 hover:-translate-y-1 transition-transform"
                                >
                                    <i className="fas fa-play"></i> Launch Terminal Window
                                </button>
                            </div>
                        </div>
                    </div>

                    {isTerminalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-[#1F2328]/60 backdrop-blur-sm p-4">
                            <div className="w-full max-w-4xl border border-[#d0d7de] rounded-lg shadow-2xl overflow-hidden flex flex-col bg-[#ffffff]">
                                
                                <div className="bg-[#f6f8fa] px-4 py-3 flex items-center justify-between border-b border-[#d0d7de]">
                                    <div className="flex items-center gap-2">
                                        <button 
                                            onClick={() => setIsTerminalOpen(false)} 
                                            className="w-3.5 h-3.5 rounded-full bg-[#ef4444] hover:bg-red-600 transition-colors cursor-pointer flex items-center justify-center group"
                                            title="Close Terminal"
                                        >
                                            <i className="fas fa-times text-[8px] text-white opacity-0 group-hover:opacity-100"></i>
                                        </button>
                                        <div className="w-3.5 h-3.5 rounded-full bg-[#f59e0b]"></div>
                                        <div className="w-3.5 h-3.5 rounded-full bg-[#10b981]"></div>
                                    </div>
                                    <span className="text-sm font-semibold text-[#24292f] font-mono tracking-tighter">cyber_agent_terminal.exe</span>
                                    <div className="w-12"></div>
                                </div>

                                <div className="bg-[#0d1117] p-6 font-mono text-sm h-[500px] md:h-[600px] overflow-y-auto flex flex-col cursor-text" onClick={() => document.getElementById('terminal-input').focus()}>
                                    <div className="space-y-1 mb-2">
                                        {terminalHistory.map((msg, idx) => (
                                            <div key={idx} className={`
                                                ${msg.type === 'system' ? 'text-[#8b949e]' : ''}
                                                ${msg.type === 'success' ? 'text-white font-bold my-2' : ''}
                                                ${msg.type === 'user' ? 'text-[#3fb950] mt-3' : ''}
                                                ${msg.type === 'ai' ? 'text-[#e6edf3] pl-4 border-l-2 border-[#3fb950] mt-1 leading-relaxed whitespace-pre-wrap' : ''}
                                                ${msg.type === 'error' ? 'text-[#f85149] pl-4 border-l-2 border-[#f85149] mt-1' : ''}
                                            `}>
                                                {msg.text}
                                            </div>
                                        ))}
                                    </div>

                                    {isProcessing && (
                                        <div className="text-[#8b949e] animate-pulse pl-4 border-l-2 border-[#3fb950] mt-1">
                                            &gt; Agent is processing...
                                        </div>
                                    )}

                                    <form onSubmit={handleTerminalSubmit} className="flex items-center gap-2 mt-auto text-[#3fb950] pt-4">
                                        <span>$</span>
                                        <input 
                                            id="terminal-input"
                                            type="text" 
                                            value={terminalInput}
                                            onChange={(e) => setTerminalInput(e.target.value)}
                                            disabled={isProcessing}
                                            className="flex-1 bg-transparent border-none outline-none text-[#e6edf3] focus:ring-0 p-0 shadow-none placeholder-[#8b949e] text-base"
                                            placeholder="ask a question..."
                                            autoComplete="off"
                                            autoFocus
                                        />
                                    </form>
                                    <div ref={terminalEndRef} />
                                </div>
                            </div>
                        </div>
                    )}
                </section>
            );
        };

        const About = () => {
            return (
                <section id="about" className="py-16 bg-[#ffffff] border-b border-[#d0d7de]">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex flex-col lg:flex-row gap-12 items-start">
                            <div className="lg:w-1/4">
                                <img 
                                    src="Pradip pandey.jfif" 
                                    alt="Pradip Pandey" 
                                    className="w-full rounded-full border border-[#d0d7de] shadow-sm mb-4 object-cover aspect-square"
                                    onError={(e) => {e.target.src = 'https://ui-avatars.com/api/?name=Pradip+Pandey&size=200&background=0969da&color=fff';}}
                                />
                                <h2 className="text-2xl font-bold text-[#1F2328]">{personalInfo.name}</h2>
                                <h3 className="text-xl text-[#656d76] font-light mb-4">Cybersecurity Professional</h3>
                                <p className="text-[#24292f] text-sm mb-4">{personalInfo.title}</p>
                                <div className="space-y-2 text-sm text-[#656d76]">
                                    <div className="flex items-center gap-2"><i className="far fa-envelope w-4"></i> {personalInfo.email}</div>
                                    <div className="flex items-center gap-2"><i className="fas fa-graduation-cap w-4"></i> Charles Sturt University</div>
                                </div>
                            </div>
                            <div className="lg:w-3/4">
                                <div className="border border-[#d0d7de] rounded-md bg-[#ffffff]">
                                    <div className="bg-[#f6f8fa] px-4 py-2 border-b border-[#d0d7de] flex items-center gap-2">
                                        <i className="far fa-file-alt text-[#656d76]"></i>
                                        <span className="font-semibold text-[#24292f] text-sm">Summary Profile</span>
                                    </div>
                                    <div className="p-8 text-[#24292f] text-base leading-relaxed space-y-4">
                                        <h2 className="text-2xl font-bold border-b border-[#d0d7de] pb-2 mb-4">About Me</h2>
                                        <p>I combine rigorous academic focus from Charles Sturt University with solid technical foundations from TAFE NSW to deliver specialized security insights. My background enables me to bridge complex infrastructure management with proactive threat mitigation strategies, creating secure, scalable enterprise architecture.</p>
                                        <p>With expertise spanning SIEM deployment, defense-in-depth engineering, and automated Python scripting, I am dedicated to real-time incident detection and response. Continuous learning is core to my approach, ensuring I stay ahead of the ever-evolving threat landscape and intersections with cloud architecture.</p>
                                        
                                        <h3 className="text-lg font-bold mt-6 mb-3">Core Competencies</h3>
                                        <div className="flex flex-wrap gap-2">
                                            {aboutHighlights.map((highlight, idx) => (
                                                <span key={idx} className="px-3 py-1 bg-[#ddf4ff] text-[#0969da] rounded-full text-xs font-semibold">
                                                    {highlight}
                                                </span>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const Skills = () => {
            return (
                <section id="skills" className="py-16 bg-[#f6f8fa] border-b border-[#d0d7de]">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <h2 className="text-2xl font-bold text-[#1F2328] mb-6"><i className="fas fa-layer-group text-[#656d76] mr-2"></i>Technical Expertise</h2>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            {skillsData.map((skill, idx) => (
                                <div key={idx} className="panel-card p-5">
                                    <h3 className="text-base font-semibold text-[#1F2328] mb-3 flex items-center gap-2">
                                        <i className={`fas ${skill.icon} text-[#656d76]`}></i>
                                        {skill.category}
                                    </h3>
                                    <ul className="space-y-2">
                                        {skill.items.map((item, i) => (
                                            <li key={i} className="flex items-start gap-2 text-[#656d76] text-sm">
                                                <i className="fas fa-check text-[#2da44e] mt-1 text-[10px]"></i>
                                                <span>{item}</span>
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const Projects = () => {
            return (
                <section id="projects" className="py-16 bg-[#ffffff] border-b border-[#d0d7de]">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <h2 className="text-2xl font-bold text-[#1F2328] mb-6"><i className="fas fa-folder text-[#656d76] mr-2"></i>Projects & Labs</h2>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {projects.map((project, idx) => (
                                <div key={idx} className="panel-card p-5 flex flex-col">
                                    <div className="flex items-start justify-between mb-2">
                                        <h3 className="text-base font-semibold text-[#0969da] cursor-pointer hover:underline flex items-center gap-2">
                                            <i className="fas fa-folder-open text-[#656d76]"></i>
                                            {project.title}
                                        </h3>
                                        <span className="text-[11px] font-semibold text-[#656d76] border border-[#d0d7de] rounded-full px-2 py-0.5">Portfolio</span>
                                    </div>
                                    
                                    <p className="text-[#656d76] text-sm mb-4 flex-grow">
                                        {project.description}
                                    </p>

                                    <div className="flex flex-wrap items-center gap-4 text-xs text-[#656d76] mt-auto">
                                        {project.tech.map((t, i) => (
                                            <span key={i} className="flex items-center gap-1">
                                                <span className="w-2.5 h-2.5 rounded-full bg-[#0969da]"></span>
                                                {t}
                                            </span>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const Education = () => {
            return (
                <section id="education" className="py-16 bg-[#f6f8fa] border-b border-[#d0d7de]">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <h2 className="text-2xl font-bold text-[#1F2328] mb-6"><i className="fas fa-graduation-cap text-[#656d76] mr-2"></i>Academic Foundation</h2>
                        
                        <div className="space-y-4">
                            {education.map((edu, idx) => (
                                <div key={idx} className="panel-card p-5 flex flex-col md:flex-row gap-4 items-start">
                                    <div className="bg-[#ffffff] border border-[#d0d7de] p-3 rounded-md shadow-sm hidden md:block">
                                        <i className="fas fa-university text-2xl text-[#24292f]"></i>
                                    </div>
                                    <div>
                                        <div className="flex items-center gap-3 mb-1">
                                            <h3 className="text-lg font-bold text-[#0969da]">{edu.degree}</h3>
                                            <span className="text-xs font-semibold text-[#656d76] bg-[#f6f8fa] border border-[#d0d7de] rounded-full px-2 py-0.5">{edu.year}</span>
                                        </div>
                                        <h4 className="text-sm font-semibold text-[#24292f] mb-2">{edu.institution}</h4>
                                        <p className="text-[#656d76] text-sm">{edu.details}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const Contact = () => {
            return (
                <section id="contact" className="py-16 bg-[#ffffff]">
                    <div className="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
                        <i className="fas fa-satellite-dish text-4xl text-[#656d76] mb-4"></i>
                        <h2 className="text-2xl font-bold text-[#1F2328] mb-4">Ready to Engage?</h2>
                        <p className="text-[#656d76] text-base mb-8">
                            Whether you’re looking to fill a role in SOC Analysis or proactive threat defense — I’m here to connect and apply continuous learning to the changing threat landscape.
                        </p>
